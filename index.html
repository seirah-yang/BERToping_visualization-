const EDGES = [
  {s:"clinical_trial",t:"data_integrity",w:10,firstYear:2011,lastYear:2025},
  {s:"clinical_trial",t:"quality_assurance",w:6,firstYear:2011,lastYear:2025},

  {s:"data_integrity",t:"oversight",w:4,firstYear:2011,lastYear:2021},
  {s:"clinical_trial",t:"risk_based_monitoring",w:3,firstYear:2023,lastYear:2025},

  {s:"quality_assurance",t:"quality_risk_assessment",w:2,firstYear:2020,lastYear:2022},
  {s:"clinical_trial",t:"adverse_event_reporting",w:2,firstYear:2011,lastYear:2019},

  {s:"data_integrity",t:"data_quality",w:1,firstYear:2011,lastYear:2025},
];

const catColor = {
  Clinical_Operations:"#378ADD",
  Data:"#639922",
  RBQM:"#D85A30",
  Monitoring:"#1D9E75",
  Governance:"#7F77DD",
  AI:"#EF9F27",
  Risk:"#D4537E",
  Statistics:"#888780",
};

function nodeColor(n) {
  if (n.isNew) return "#1D9E75";
  if (n.delta > 0.08) return "#EF9F27";
  if (n.delta < -0.2) return "#D85A30";
  return catColor[n.cat] || "#888780";
}

const canvas = document.getElementById("c3d");
const wrap = document.getElementById("canvas-wrap");
let W = wrap.clientWidth, H = wrap.clientHeight;
canvas.width = W; canvas.height = H;

const renderer = new THREE.WebGLRenderer({canvas, antialias:true, alpha:false});
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(W, H);
renderer.setClearColor(0x0a0e1a, 1);

const scene = new THREE.Scene();
const cam = new THREE.PerspectiveCamera(55, W/H, 0.1, 100);
cam.position.set(0, 0, 16);

const ambLight = new THREE.AmbientLight(0xffffff, 0.7);
scene.add(ambLight);
const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
dirLight.position.set(5,8,10);
scene.add(dirLight);

const nodeMap = {};
const meshes = [];
const edgeMeshes = [];

NODES.forEach(n => {
  const r = Math.max(0.12, 0.12 + n.freq * 0.065);
  const geo = new THREE.SphereGeometry(r, 20, 20);
  const col = nodeColor(n);
  const mat = new THREE.MeshStandardMaterial({color:col, roughness:0.4, metalness:0.1});
  const mesh = new THREE.Mesh(geo, mat);
  mesh.position.set(n.x, n.y, n.z);
  mesh.userData = n;
  scene.add(mesh);
  meshes.push(mesh);
  nodeMap[n.id] = mesh;

  if (n.isNew || n.delta > 0.08 || n.btw > 0.1) {
    const ringGeo = new THREE.RingGeometry(r+0.08, r+0.18, 32);
    const ringMat = new THREE.MeshBasicMaterial({color:col, side:THREE.DoubleSide, transparent:true, opacity:0.45});
    const ring = new THREE.Mesh(ringGeo, ringMat);
    ring.position.copy(mesh.position);
    scene.add(ring);
    mesh.userData._ring = ring;
  }
});

function makeEdge(src, tgt, w, isCovid) {
  const sM = nodeMap[src];
  const tM = nodeMap[tgt];

  if (!sM || !tM) return null;
  
  const p1 = sM.position, p2 = tM.position;
  const pts = [p1, p2];
  
  const geo = new THREE.BufferGeometry().setFromPoints([
    sM.position,
    tM.position
  ]);

  const col = isCovid ? 0x00FFD0 : 0xE5E7EB;
  
  const opacity = isCovid
    ? Math.min(1, 0.6 + w * 0.08)
    : Math.min(0.8, 0.3 + w * 0.05);
  
  const mat = new THREE.LineBasicMaterial({
    color: col,
    transparent: true,
    opacity: opacity
   });

  const line = new THREE.Line(geo, mat);

  line.userData = {
    src,
    tgt,
    w,
    isCovid
  };
  
  scene.add(line);
  return line;
  }
  
EDGES.forEach(e => {
  const isCovid = e.firstYear >= 2020;
  const line = makeEdge(e.s, e.t, e.w, isCovid);
  if (line) edgeMeshes.push(line);
});

let isDragging = false, prevMouse = {x:0, y:0};
let rotX = 0, rotY = 0;
const pivot = new THREE.Group();
scene.add(pivot);
meshes.forEach(m => { scene.remove(m); pivot.add(m); 
                     if(m.userData._ring){scene.remove(m.userData._ring);
                                          pivot.add(m.userData._ring);} 
                    });
edgeMeshes.forEach(e => { scene.remove(e); 
                         pivot.add(e); 
                        });

canvas.addEventListener("mousedown", e => { isDragging=true; prevMouse={x:e.clientX,y:e.clientY}; });
window.addEventListener("mouseup", () => isDragging=false);
canvas.addEventListener("mousemove", e => {
  if (isDragging) {
    const dx = e.clientX - prevMouse.x, dy = e.clientY - prevMouse.y;
    rotY += dx * 0.008; rotX += dy * 0.008;
    pivot.rotation.y = rotY; pivot.rotation.x = rotX;
    prevMouse = {x:e.clientX,y:e.clientY};
  } else {
    handleHover(e);
  }
});
canvas.addEventListener("wheel", e => { cam.position.z = Math.max(4, Math.min(30, cam.position.z + e.deltaY * 0.02)); });
canvas.addEventListener("click", e => handleClick(e));

const raycaster = new THREE.Raycaster();
const mouse2 = new THREE.Vector2();
const tip = document.getElementById("tip");

function getIntersects(e) {
  const rect = canvas.getBoundingClientRect();
  mouse2.x = ((e.clientX - rect.left) / rect.width) * 2 - 1;
  mouse2.y = -((e.clientY - rect.top) / rect.height) * 2 + 1;
  raycaster.setFromCamera(mouse2, cam);
  return raycaster.intersectObjects(meshes);
}

function handleHover(e) {
  const hits = getIntersects(e);
  if (hits.length > 0) {
    const n = hits[0].object.userData;
    const rect = canvas.getBoundingClientRect();
    const tx = e.clientX - rect.left + 12, ty = e.clientY - rect.top + 12;
    const changeStr = n.delta > 0 ? `+${(n.delta*100).toFixed(0)}%p ↑` : n.delta < 0 ? `${(n.delta*100).toFixed(0)}%p ↓` : "변화 없음";
    const changeCol = n.delta > 0 ? "#5DCAA5" : n.delta < 0 ? "#F0997B" : "#9ca3af";
    tip.innerHTML = `<div style="font-weight:500;margin-bottom:4px;">${n.label}</div>
      <div style="color:#9ca3af;font-size:11px;margin-bottom:6px;">${n.cat.replace('_',' ')}</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:3px 10px;font-size:11px;">
        <span style="color:#9ca3af;">Pre-COVID</span><span>${(n.pre*100).toFixed(0)}%</span>
        <span style="color:#9ca3af;">Post-COVID</span><span>${(n.post*100).toFixed(0)}%</span>
        <span style="color:#9ca3af;">변화</span><span style="color:${changeCol};">${changeStr}</span>
        <span style="color:#9ca3af;">문헌 수</span><span>${n.freq}편</span>
      </div>
      ${n.isNew ? '<div style="margin-top:6px;font-size:10px;background:rgba(29,158,117,0.25);color:#5DCAA5;padding:2px 6px;border-radius:4px;display:inline-block;">New after COVID</div>' : ''}`;
    tip.style.left = tx + "px";
    tip.style.top = ty + "px";
    tip.style.display = "block";
    canvas.style.cursor = "pointer";
  } else {
    tip.style.display = "none";
    canvas.style.cursor = "default";
  }
}

function handleClick(e) {
  const hits = getIntersects(e);
  if (hits.length > 0) {
    const n = hits[0].object.userData;
    showInfoPanel(n);
  }
}

function showInfoPanel(n) {
  const panel = document.getElementById("info-panel");
  document.getElementById("info-title").textContent = n.label.toUpperCase();
  const statusLabel = n.isNew ? "New after COVID (Post-COVID)" : n.delta > 0.08 ? "Post-COVID Rise" : n.delta < -0.2 ? "Decline (Gap 영역)" : "Stable";
  const statusCol = n.isNew ? "#1D9E75" : n.delta > 0.08 ? "#EF9F27" : n.delta < -0.2 ? "#D85A30" : "#888";
  document.getElementById("info-body").innerHTML = `
    <span style="color:var(--color-text-secondary);">카테고리</span><span>${n.cat.replace(/_/g,' ')}</span>
    <span style="color:var(--color-text-secondary);">Pre-COVID 비중</span><span>${(n.pre*100).toFixed(0)}%</span>
    <span style="color:var(--color-text-secondary);">Post-COVID 비중</span><span>${(n.post*100).toFixed(0)}%</span>
    <span style="color:var(--color-text-secondary);">변화 (Δ)</span><span style="color:${statusCol};">${n.delta > 0 ? '+':''}${(n.delta*100).toFixed(0)}%p</span>
    <span style="color:var(--color-text-secondary);">문헌 수</span><span>${n.freq}편</span>
    <span style="color:var(--color-text-secondary);">연결 강도</span><span>${n.deg}</span>
    <span style="color:var(--color-text-secondary);">매개 중심성</span><span>${n.btw.toFixed(3)}</span>
    <span style="color:var(--color-text-secondary);">갭 상태</span><span style="color:${statusCol};">${statusLabel}</span>`;
  panel.style.display = "block";
}

let currentFilter = "all";
function setFilter(f) {
  currentFilter = f;
  meshes.forEach(m => {
    const n = m.userData;
    let vis = true;
    if (f === "new") vis = n.isNew;
    else if (f === "rise") vis = !n.isNew && n.delta > 0.05;
    else if (f === "dec") vis = n.delta < -0.15;
    else if (f === "pre") vis = n.pre > 0;
    m.visible = vis;
    if (n._ring) n._ring.visible = vis;
  });
  edgeMeshes.forEach(e => {
    const sVis = meshes.find(m => m.userData.id === e.userData.src)?.visible;
    const tVis = meshes.find(m => m.userData.id === e.userData.tgt)?.visible;
    e.visible = f === "all" || (sVis && tVis);
    if (f === "pre") e.visible = !e.userData.isCovid;
  });
}

let t = 0;
function animate() {
  requestAnimationFrame(animate);
  t += 0.012;
  if (!isDragging) {
    pivot.rotation.y += 0.002;
    rotY = pivot.rotation.y;
  }
  meshes.forEach(m => {
    if (m.userData._ring) {
      m.userData._ring.rotation.z = t * 0.6;
      m.userData._ring.material.opacity = 0.25 + 0.2 * Math.sin(t * 1.5 + m.userData.x);
    }
    if (m.userData.isNew) {
      m.scale.setScalar(1 + 0.06 * Math.sin(t * 2 + m.userData.y));
    }
  });
  renderer.render(scene, cam);
}
animate();

window.addEventListener("resize", () => {
  W = wrap.clientWidth; H = wrap.clientHeight;
  renderer.setSize(W,H);
  cam.aspect = W/H;
  cam.updateProjectionMatrix();
});
</script>
